services:
  web:
    image: nginx:alpine
    container_name: sudokusense-web
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./nginx-web.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web-dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
